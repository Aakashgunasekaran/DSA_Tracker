<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DSA Master Problem Sheet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --color-text-primary:#1a1a1a;--color-text-secondary:#555;--color-text-tertiary:#888;
  --color-background-primary:#fff;--color-background-secondary:#f7f7f7;
  --color-border-tertiary:#e4e4e4;--color-border-secondary:#d0d0d0;
  --border-radius-sm:4px;--border-radius-md:6px;--border-radius-lg:8px;
  --font-mono:ui-monospace,monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#1a1a1a;max-width:900px;margin:0 auto;padding:0 16px 60px}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.hdr{padding:1.5rem 0 1rem;border-bottom:0.5px solid var(--color-border-tertiary);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.hdr-left{}
.title{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.subtitle{font-size:14px;color:var(--color-text-secondary);margin-top:4px}
.sync-status{font-size:11px;padding:4px 10px;border-radius:99px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-secondary);color:var(--color-text-tertiary);white-space:nowrap;margin-top:6px;cursor:default;user-select:none}
.sync-status.syncing{color:#185FA5;border-color:#a8cdf0;background:#EBF4FF}
.sync-status.saved{color:#3B6D11;border-color:#b5d98a;background:#EAF3DE}
.sync-status.error{color:#A32D2D;border-color:#f0a8a8;background:#FCEBEB}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:1rem 0}
.stat-card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.progress-bar{height:6px;background:var(--color-border-tertiary);border-radius:3px;margin:6px 0 0;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:#639922;transition:width 0.4s}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin:1rem 0;align-items:center}
.controls select,.controls input{font-size:13px;padding:6px 10px;height:32px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:#fff;color:#1a1a1a}
.controls input{flex:1;min-width:150px}
.filter-btn{font-size:12px;padding:5px 11px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);cursor:pointer;color:var(--color-text-secondary)}
.filter-btn:hover{background:var(--color-background-secondary)}
.filter-btn.on{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.reset-btn{font-size:12px;padding:5px 11px;border:0.5px solid #f0a8a8;border-radius:var(--border-radius-md);background:#fff;cursor:pointer;color:#A32D2D;margin-left:auto}
.reset-btn:hover{background:#FCEBEB}
.phase{margin:1.5rem 0;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.phase-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--color-background-secondary);cursor:pointer}
.phase-title{font-size:15px;font-weight:500;color:var(--color-text-primary);display:flex;align-items:center;gap:10px}
.phase-badge{font-size:11px;padding:2px 9px;border-radius:99px;font-weight:500}
.b1{background:#EAF3DE;color:#3B6D11}.b2{background:#E6F1FB;color:#185FA5}
.b3{background:#FAEEDA;color:#854F0B}.b4{background:#FAECE7;color:#993C1D}
.phase-meta{display:flex;align-items:center;gap:12px}
.phase-prog{font-size:12px;color:var(--color-text-tertiary)}
.pbar{height:3px;background:var(--color-border-tertiary)}
.pbar-fill{height:100%;transition:width 0.4s}
.f1{background:#639922}.f2{background:#378ADD}.f3{background:#BA7517}.f4{background:#D85A30}
.topic{border-top:0.5px solid var(--color-border-tertiary)}
.topic-hdr{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;background:var(--color-background-secondary);border-top:0.5px solid var(--color-border-tertiary);cursor:pointer}
.topic-name{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.04em}
.topic-cnt{font-size:12px;color:var(--color-text-tertiary)}
.prob-row{display:flex;align-items:center;gap:10px;padding:9px 16px 9px 20px;border-top:0.5px solid var(--color-border-tertiary);transition:background 0.15s}
.prob-row:hover{background:var(--color-background-secondary)}
.prob-row.done{opacity:0.45}
.prob-row input[type=checkbox]{width:14px;height:14px;cursor:pointer;flex-shrink:0;accent-color:#639922}
.prob-num{font-size:12px;color:var(--color-text-tertiary);min-width:38px;font-family:var(--font-mono)}
.prob-name{font-size:13px;color:var(--color-text-primary);flex:1;text-decoration:none}
.prob-name:hover{color:#185FA5;text-decoration:underline}
.diff{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500;flex-shrink:0}
.easy{background:#EAF3DE;color:#3B6D11}
.medium{background:#FAEEDA;color:#854F0B}
.hard{background:#FCEBEB;color:#A32D2D}
.tags{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.tag{font-size:10px;padding:1px 6px;border-radius:99px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.no-res{padding:2rem;text-align:center;font-size:13px;color:var(--color-text-tertiary)}
.hidden{display:none}
.toggle-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--color-text-tertiary);background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:var(--border-radius-sm);transition:background 0.15s,color 0.15s;flex-shrink:0}
.toggle-btn:hover{background:var(--color-border-tertiary);color:var(--color-text-secondary)}
.toggle-btn .chevron{display:inline-block;transition:transform 0.2s;font-style:normal}
.phase.collapsed>.topic,.phase.collapsed .pbar{display:none}
.topic.collapsed .prob-row{display:none}
.user-id-bar{font-size:11px;color:var(--color-text-tertiary);padding:8px 0 0;display:flex;align-items:center;gap:6px}
.user-id-bar code{font-family:var(--font-mono);background:var(--color-background-secondary);padding:1px 5px;border-radius:3px;border:0.5px solid var(--color-border-tertiary)}
</style>
</head>

  </select>
  <button class="filter-btn on" id="unsolved-btn" onclick="toggleUnsolved()">Unsolved only</button>
  <button class="reset-btn" onclick="resetProgress()">Reset all</button>
</div>

<div id="pc"></div>
<div class="no-res hidden" id="no-res">No problems match your filter.</div>

// ── State ──────────────────────────────────────────────────────────────────────
let solved = {};       // { lc1: "easy", ... }
let userId = null;
let unOnly = true;
let saveTimer = null;

// ── User ID persistence ───────────────────────────────────────────────────────
function loadUserId() {
  return localStorage.getItem('dsa_user_id') || null;
}
function saveUserId(id) {
  localStorage.setItem('dsa_user_id', id);
}

// ── Sync badge ────────────────────────────────────────────────────────────────
function setSyncStatus(state, text) {
  const b = document.getElementById('sync-badge');
  b.className = 'sync-status ' + state;
  b.textContent = text;
}

// ── API helpers ───────────────────────────────────────────────────────────────
async function apiGet(path) {
  const headers = userId ? { 'x-user-id': userId } : {};
  const res = await fetch(path, { headers });
  const uid = res.headers.get('x-user-id');
  if (uid) { userId = uid; saveUserId(uid); }
  return res.json();
}

async function apiPost(path, body) {
  const headers = { 'Content-Type': 'application/json' };
  if (userId) headers['x-user-id'] = userId;
  const res = await fetch(path, { method: 'POST', headers, body: JSON.stringify(body) });
  const uid = res.headers.get('x-user-id');
  if (uid) { userId = uid; saveUserId(uid); }
  return res.json();
}

async function apiDelete(path) {
  const headers = userId ? { 'x-user-id': userId } : {};
  const res = await fetch(path, { method: 'DELETE', headers });
  return res.json();
}

// ── Load progress from server ─────────────────────────────────────────────────
async function loadProgress() {
  setSyncStatus('syncing', '⟳ Loading…');
  try {
    userId = loadUserId(); // pre-load so first request carries it
    const data = await apiGet('/api/progress');
    solved = data.solved || {};
    document.getElementById('uid-display').textContent = userId || '—';
    setSyncStatus('saved', '✓ Synced');
  } catch (e) {
    console.error(e);
    setSyncStatus('error', '✗ Offline — using local');
    solved = JSON.parse(localStorage.getItem('dsa_solved') || '{}');
  }
}

// ── Save a single problem change ──────────────────────────────────────────────
async function saveMark(lcNum, diff, isSolved) {
  setSyncStatus('syncing', '⟳ Saving…');
  try {
    await apiPost('/api/progress', { lcNum, diff, solved: isSolved });
    setSyncStatus('saved', '✓ Saved');
    // Also keep localStorage as offline fallback
    localStorage.setItem('dsa_solved', JSON.stringify(solved));
  } catch (e) {
    setSyncStatus('error', '✗ Save failed');
  }
}

// ── Problem helpers ────────────────────────────────────────────────────────────
function allProbs() { return D.flatMap(ph => ph.topics.flatMap(t => t.p)); }

// ── Build DOM ──────────────────────────────────────────────────────────────────
function build() {
  const total = allProbs().length;
  document.getElementById('sub-txt').textContent =
    `${total} problems · 4 phases · every major interview pattern`;
  const pc = document.getElementById('pc');
  D.forEach(ph => {
    const pt = ph.topics.reduce((a, t) => a + t.p.length, 0);
    const div = document.createElement('div');
    div.className = 'phase'; div.dataset.phase = ph.id;
    div.innerHTML = `<div class="phase-hdr" onclick="togglePhase('${ph.id}')">
<div class="phase-title"><span class="phase-badge ${ph.b}">${ph.lbl}</span>${ph.name}</div>
<div class="phase-meta"><span class="phase-prog" id="pp-${ph.id}">0 / ${pt}</span>
<button class="toggle-btn" id="ph-btn-${ph.id}" onclick="event.stopPropagation();togglePhase('${ph.id}')"><i class="chevron" id="ph-chev-${ph.id}">▾</i> Collapse</button>
</div></div><div class="pbar"><div class="pbar-fill ${ph.f}" id="pb-${ph.id}" style="width:0%"></div></div>`;
    ph.topics.forEach(top => {
      const tid = ph.id + '_' + top.n.replace(/\W+/g, '_');
      const td = document.createElement('div');
      td.className = 'topic';
      td.innerHTML = `<div class="topic-hdr" onclick="toggleTopic('${tid}')"><span class="topic-name">${top.n}</span><div style="display:flex;align-items:center;gap:8px"><span class="topic-cnt" id="tc-${tid}">${top.p.length} problems</span><button class="toggle-btn" id="tp-btn-${tid}" onclick="event.stopPropagation();toggleTopic('${tid}')"><i class="chevron" id="tp-chev-${tid}">▾</i> Collapse</button></div></div>`;
      top.p.forEach(p => {
        const pid = 'lc' + p.lc;
        const row = document.createElement('div');
        row.className = 'prob-row';
        row.dataset.diff = p.d; row.dataset.tags = p.t.join(',').toLowerCase();
        row.dataset.nm = p.nm.toLowerCase() + ' ' + p.lc; row.dataset.pid = pid;
        const lcSlug = p.nm.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        row.innerHTML = `<input type="checkbox" id="${pid}" onchange="mark(${p.lc},'${p.d}',this.checked)">
<span class="prob-num">${p.lc}</span>
<a class="prob-name" href="https://leetcode.com/problems/${lcSlug}/" target="_blank">${p.nm}</a>
<span class="diff ${p.d}">${p.d}</span>
<div class="tags">${p.t.map(x => `<span class="tag">${x}</span>`).join('')}</div>`;
        td.appendChild(row);
      });
      div.appendChild(td);
    });
    pc.appendChild(div);
  });
}

// ── Restore checkbox states from solved map ───────────────────────────────────
function restoreCheckboxes() {
  Object.entries(solved).forEach(([pid, d]) => {
    if (d) {
      const cb = document.getElementById(pid);
      if (cb) {
        cb.checked = true;
        const row = cb.closest('.prob-row');
        if (row) row.classList.add('done');
      }
    }
  });
}

// ── Mark / unmark ─────────────────────────────────────────────────────────────
function mark(lcNum, diff, checked) {
  const pid = 'lc' + lcNum;
  solved[pid] = checked ? diff : null;
  const row = document.querySelector(`[data-pid="${pid}"]`);
  if (row) row.classList.toggle('done', checked);
  updateStats();
  applyFilters();
  saveMark(lcNum, diff, checked);
}

// ── Stats ──────────────────────────────────────────────────────────────────────
function updateStats() {
  const c = { easy: 0, medium: 0, hard: 0 }; let tot = 0;
  Object.values(solved).forEach(d => { if (d) { c[d]++; tot++; } });
  const all = allProbs().length;
  document.getElementById('tot').textContent = tot + ' / ' + all;
  document.getElementById('s-easy').textContent = c.easy;
  document.getElementById('s-med').textContent = c.medium;
  document.getElementById('s-hard').textContent = c.hard;
  document.getElementById('tot-bar').style.width = Math.round(tot / all * 100) + '%';
  D.forEach(ph => {
    let pt = 0, ps = 0;
    ph.topics.forEach(t => t.p.forEach(p => { pt++; if (solved['lc' + p.lc]) ps++; }));
    document.getElementById('pp-' + ph.id).textContent = ps + ' / ' + pt;
    document.getElementById('pb-' + ph.id).style.width = Math.round(ps / pt * 100) + '%';
  });
}

// ── Filters ────────────────────────────────────────────────────────────────────
function applyFilters() {
  const q  = document.getElementById('q').value.toLowerCase();
  const fd = document.getElementById('fd').value;
  const ft = document.getElementById('ft').value.toLowerCase();
  let any = false;
  document.querySelectorAll('.prob-row').forEach(r => {
    const mq = !q  || r.dataset.nm.includes(q);
    const md = !fd || r.dataset.diff === fd;
    const mt = !ft || r.dataset.tags.includes(ft);
    const mu = !unOnly || !solved[r.dataset.pid];
    const show = mq && md && mt && mu;
    r.style.display = show ? '' : 'none';
    if (show) any = true;
  });
  document.getElementById('no-res').classList.toggle('hidden', any);
}

function toggleUnsolved() {
  unOnly = !unOnly;
  document.getElementById('unsolved-btn').classList.toggle('on', unOnly);
  applyFilters();
}

// ── Collapse / expand ─────────────────────────────────────────────────────────
function togglePhase(id) {
  const el = document.querySelector(`[data-phase="${id}"]`);
  const collapsed = el.classList.toggle('collapsed');
  const chev = document.getElementById('ph-chev-' + id);
  const btn  = document.getElementById('ph-btn-' + id);
  chev.style.transform = collapsed ? 'rotate(-90deg)' : '';
  btn.childNodes[1].textContent = collapsed ? ' Expand' : ' Collapse';
}
function toggleTopic(tid) {
  const el = document.getElementById('tp-btn-' + tid).closest('.topic');
  const collapsed = el.classList.toggle('collapsed');
  const chev = document.getElementById('tp-chev-' + tid);
  const btn  = document.getElementById('tp-btn-' + tid);
  chev.style.transform = collapsed ? 'rotate(-90deg)' : '';
  btn.childNodes[1].textContent = collapsed ? ' Expand' : ' Collapse';
}

// ── Reset ──────────────────────────────────────────────────────────────────────
async function resetProgress() {
  if (!confirm('Reset ALL your progress? This cannot be undone.')) return;
  setSyncStatus('syncing', '⟳ Resetting…');
  try {
    await apiDelete('/api/progress');
    solved = {};
    localStorage.removeItem('dsa_solved');
    document.querySelectorAll('.prob-row input[type=checkbox]').forEach(cb => { cb.checked = false; });
    document.querySelectorAll('.prob-row').forEach(r => r.classList.remove('done'));
    updateStats(); applyFilters();
    setSyncStatus('saved', '✓ Reset done');
  } catch (e) {
    setSyncStatus('error', '✗ Reset failed');
  }
}

// ── Init ───────────────────────────────────────────────────────────────────────
(async () => {
  build();
  await loadProgress();
  document.getElementById('uid-display').textContent = userId || '—';
  restoreCheckboxes();
  updateStats();
  applyFilters();
})();
</script>
